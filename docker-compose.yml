version: "3.9"

services:
  # ---- Database ----
  mysql:
    image: mysql:8.0
    container_name: arbitrage-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-arbitrage}
      MYSQL_USER: ${MYSQL_USER:-myuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-YourPassword123!}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - arbitrage
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # ---- Cache ----
  redis:
    image: redis:7-alpine
    container_name: arbitrage-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - arbitrage
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---- Backend API ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arbitrage-backend
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=mysql+aiomysql://${MYSQL_USER:-myuser}:${MYSQL_PASSWORD:-YourPassword123!}@mysql:3306/${MYSQL_DATABASE:-arbitrage}?charset=utf8mb4
      - REDIS_URL=redis://redis:6379/0
      - TRADING_PAPER_MODE=${TRADING_PAPER_MODE:-true}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - arbitrage
    volumes:
      - backend_logs:/app/logs

  # ---- Frontend ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-8000}
        NEXT_PUBLIC_WS_URL: ws://localhost:${API_PORT:-8000}/ws
    container_name: arbitrage-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${API_PORT:-8000}
      - NEXT_PUBLIC_WS_URL=ws://localhost:${API_PORT:-8000}/ws
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - arbitrage

  # ---- Reverse Proxy (optional) ----
  nginx:
    image: nginx:alpine
    container_name: arbitrage-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - arbitrage
    profiles:
      - with-nginx

volumes:
  mysql_data:
  redis_data:
  backend_logs:

networks:
  arbitrage:
    driver: bridge
